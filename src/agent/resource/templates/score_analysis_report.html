<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{REPORT_TITLE}}</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f6f8fb; color: #1f2937; }
    .container { max-width: 980px; margin: 24px auto; padding: 0 16px; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px 24px; margin-bottom: 14px; }
    h1 { margin: 0 0 8px; font-size: 24px; color: #111827; }
    h2 { margin: 0 0 10px; font-size: 18px; color: #1f2937; }
    h3 { margin: 14px 0 8px; font-size: 15px; color: #374151; }
    p { margin: 6px 0; line-height: 1.7; }
    ul { margin: 6px 0 0; padding-left: 20px; }
    li { margin: 4px 0; line-height: 1.6; }
    .meta { color: #6b7280; font-size: 13px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 10px; }
    .kpi { border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px 12px; background: #f9fafb; }
    .kpi .label { font-size: 12px; color: #6b7280; }
    .kpi .value { margin-top: 4px; font-size: 18px; font-weight: 600; color: #111827; }
    .footer { color: #6b7280; font-size: 12px; text-align: right; }
  </style>
</head>
<body>
  <div class="container">
    <section class="card">
      <h1>{{REPORT_TITLE}}</h1>
      <p class="meta">{{REPORT_SUBTITLE}}</p>
      <p class="meta">{{REPORT_TIME}}</p>
    </section>

    <section class="card">
      <h2>核心指标</h2>
      <div class="grid">
        <div class="kpi">
          <div class="label">样本总数</div>
          <div class="value">{{TOTAL_COUNT}}</div>
        </div>
        <div class="kpi">
          <div class="label">平均分</div>
          <div class="value">{{AVG_SCORE}}</div>
        </div>
        <div class="kpi">
          <div class="label">及格率</div>
          <div class="value">{{PASS_RATE}}</div>
        </div>
        <div class="kpi">
          <div class="label">优秀率</div>
          <div class="value">{{EXCELLENT_RATE}}</div>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>总体分析</h2>
      <div>{{SUMMARY}}</div>
    </section>

    <section class="card">
      <h2>分科目表现</h2>
      <div>{{SUBJECT_BREAKDOWN}}</div>
    </section>

    <section class="card">
      <h2>改进建议</h2>
      <div>{{RECOMMENDATIONS}}</div>
    </section>

    <div class="footer">Generated by awesome-project agent</div>
  </div>
</body>
</html>
